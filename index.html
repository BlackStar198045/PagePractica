<!DOCTYPE html>
<html lang="es"/>

<html>

<head>
	<meta charset="UTF-8">
	<style>

		body{
			margin:0;
			padding:0;
		}
		.atributospagina{
			width:100vw;
			height:100vh;
			overflow:hidden;
			display:flex;
			align-items:center;
			justify-content:center;
		}

		.atributospagina img{
			width:100%;
			height:100%;
			object-fit:cover;
			position:absolute;
			top:0;
			left:0;
			z-index:0;
		}

/*
ESTE ES EL CÓDIGO QUE QUIERES VER
Los fondos siempre deben estar en RGBA para crear un efecto opaco rojo, verde, azul y alfa.
Añadir el filtro de fondo añade el desenfoque del fondo.
*/

		.atributospagina .e-box{
			position:relative;
			z-index:50;
			width: 400px;  /* Cambia el tamaño de la caja */
			height: 180px; /* Cambia el tamaño de la caja */
			display:flex;
			align-items:center;
			justify-content:center;
			font-family:'Arial', sans-serif;
			font-weight:bold;
			font-size:2vw;
			border-radius:10px;
			backdrop-filter:blur(5px);
			background:rgba(255,255,255,0.5);
			border:1px solid rgba(255,255,255,0.6);
			color:#222222;
		}

		.atributospagina .e-box.black{
			background:rgba(0,0,0,0.8);
			border:1px solid rgba(0,0,0,0.9);
			color:#fefefe;
		}
</style>
</head>



<div class="atributospagina">
	<img class="atributospagina img" src="img/FONDO.jpg" alt="Foto de mi portfolio">
	
	<!-- Puedes cambiar entre 'white' o 'black' el elemento class -->
	<div class="e-box white">
		FRAN MORILLAS
	</div>
</div>
</html>
