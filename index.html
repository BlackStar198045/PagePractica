<!DOCTYPE html>
<html lang="es"/>

<html>

<head>
	<meta charset="UTF-8">
	<style>
		.cards {
		display: flex;
		gap: 2px;
	   }

.card {
		width: 30px;
		height: 100px;
		background: red;
		transition: 0.3s;
		filter: brightness(0.5);

		&:hover {
			scale: 1.3;
			filter: brightness(1);
			z-index: 3;

		/* next card */
		& + * {
			scale: 1.2;
			filter: brightness(0.8);
			z-index: 2;
		}
    /* next card after that */
		& + * + * {
			scale: 1.1;
			filter: brightness(0.9);
			z-index: 1;
		}

    /* previous card */
		:has(+ &) {
			scale: 1.2;
			filter: brightness(0.9);
			z-index: 2;
		}
    /* previous card before that */
		:has(+ * + &) {
			scale: 1.1;
			filter: brightness(0.8);
			z-index: 1;
		}
  } /* este es el que cierra &:hover  */
} 
		
		body{
			margin:0;
			padding:0;
			height: 100vh;
			margin: 0;
			display: grid;
			place-items: center;
			overflow: clip;
		}
		.atributospagina{
			width:100vw;
			height:100vh;
			overflow:hidden;
			display:flex;
			align-items:center;
			justify-content:center;
		}

		.atributospagina img{
			width:100%;
			height:100%;
			object-fit:cover;
			position:absolute;
			top:0;
			left:0;
			z-index:0;
		}

/*
ESTE ES EL CÓDIGO QUE QUIERES VER
Los fondos siempre deben estar en RGBA para crear un efecto opaco rojo, verde, azul y alfa.
Añadir el filtro de fondo añade el desenfoque del fondo.
*/

		.atributospagina .e-box{
			position:relative;
			z-index:50;
			width:30vw;
			height:20vh;
			display:flex;
			align-items:center;
			justify-content:center;
			font-family:'Arial', sans-serif;
			font-weight:bold;
			font-size:2vw;
			border-radius:10px;
			backdrop-filter:blur(5px);
			background:rgba(255,255,255,0.5);
			border:1px solid rgba(255,255,255,0.6);
			color:#222222;
		}

		.atributospagina .e-box.black{
			background:rgba(0,0,0,0.8);
			border:1px solid rgba(0,0,0,0.9);
			color:#fefefe;
		}
</style>
</head>
<body>
